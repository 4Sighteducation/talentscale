<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Scale — Abstract Logo Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080c;
    --card: #111118;
    --border: #1e1e2a;
    --text: #e8e8ef;
    --muted: #6a6a7e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 60px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 64px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .header p {
    font-size: 12px;
    color: #44445a;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 28px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), border-color 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: #2a2a3a;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }

  .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
  }

  .logo-dark {
    background: #06060a;
    border-radius: 14px;
    padding: 40px 48px;
    width: 100%;
    display: flex;
    justify-content: center;
    border: 1px solid #14141e;
  }

  .logo-light {
    background: #f8f8fa;
    border-radius: 14px;
    padding: 40px 48px;
    width: 100%;
    display: flex;
    justify-content: center;
    border: 1px solid #e8e8ec;
  }

  .color-swatches {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
  }

  .swatch-label {
    font-size: 10px;
    color: #44445a;
    margin-left: 8px;
    font-family: 'DM Sans', monospace;
    letter-spacing: 0.5px;
  }

  svg text {
    font-family: 'Outfit', sans-serif;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Talent Scale</h1>
  <p>Abstract & stylish concepts — Vol. 2</p>
</div>

<div class="grid">

  <!-- OPTION A: Orbital Ring — Coral & Peach -->
  <div class="card">
    <span class="card-label">Option A — Orbital</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oA" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f97316"/>
              <stop offset="50%" stop-color="#fb923c"/>
              <stop offset="100%" stop-color="#fdba74"/>
            </linearGradient>
          </defs>
          <!-- Abstract orbital ring with break -->
          <ellipse cx="30" cy="38" rx="24" ry="24" fill="none" stroke="url(#oA)" stroke-width="2.5" stroke-dasharray="110 42" transform="rotate(-20 30 38)"/>
          <ellipse cx="30" cy="38" rx="14" ry="14" fill="none" stroke="#fdba74" stroke-width="1" opacity="0.3" transform="rotate(25 30 38)"/>
          <!-- Nucleus dot -->
          <circle cx="30" cy="38" r="4.5" fill="url(#oA)"/>
          <!-- Tiny satellite -->
          <circle cx="50" cy="22" r="2" fill="#fdba74"/>
          <text x="68" y="34" font-size="26" font-weight="700" fill="#fff8f1" letter-spacing="1">talent</text>
          <text x="68" y="58" font-size="18" font-weight="300" fill="#fb923c" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oAl" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ea580c"/>
              <stop offset="100%" stop-color="#f97316"/>
            </linearGradient>
          </defs>
          <ellipse cx="30" cy="38" rx="24" ry="24" fill="none" stroke="url(#oAl)" stroke-width="2.5" stroke-dasharray="110 42" transform="rotate(-20 30 38)"/>
          <ellipse cx="30" cy="38" rx="14" ry="14" fill="none" stroke="#f97316" stroke-width="1" opacity="0.25" transform="rotate(25 30 38)"/>
          <circle cx="30" cy="38" r="4.5" fill="url(#oAl)"/>
          <circle cx="50" cy="22" r="2" fill="#ea580c"/>
          <text x="68" y="34" font-size="26" font-weight="700" fill="#1a1a1a" letter-spacing="1">talent</text>
          <text x="68" y="58" font-size="18" font-weight="300" fill="#c2410c" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">
      <div class="swatch" style="background:#f97316"></div>
      <div class="swatch" style="background:#fdba74"></div>
      <div class="swatch" style="background:#431407"></div>
      <span class="swatch-label">#f97316 · #fdba74</span>
    </div>
  </div>

  <!-- OPTION B: Möbius Ribbon — Teal & Aqua -->
  <div class="card">
    <span class="card-label">Option B — Continuum</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oB" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#0d9488"/>
              <stop offset="100%" stop-color="#5eead4"/>
            </linearGradient>
          </defs>
          <!-- Möbius-style infinity/ribbon -->
          <path d="M14,38 C14,22 26,14 34,26 C42,38 46,14 54,14 C62,14 54,38 54,38 C54,54 42,62 34,50 C26,38 14,62 14,38 Z" 
                fill="none" stroke="url(#oB)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Inner glow line -->
          <path d="M22,38 C22,30 28,24 34,32 C40,40 44,24 48,24" 
                fill="none" stroke="#5eead4" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
          <text x="70" y="34" font-size="26" font-weight="700" fill="#f0fdfa" letter-spacing="1">talent</text>
          <text x="70" y="58" font-size="18" font-weight="300" fill="#2dd4bf" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oBl" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#0f766e"/>
              <stop offset="100%" stop-color="#0d9488"/>
            </linearGradient>
          </defs>
          <path d="M14,38 C14,22 26,14 34,26 C42,38 46,14 54,14 C62,14 54,38 54,38 C54,54 42,62 34,50 C26,38 14,62 14,38 Z" 
                fill="none" stroke="url(#oBl)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22,38 C22,30 28,24 34,32 C40,40 44,24 48,24" 
                fill="none" stroke="#0d9488" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
          <text x="70" y="34" font-size="26" font-weight="700" fill="#0a0a0a" letter-spacing="1">talent</text>
          <text x="70" y="58" font-size="18" font-weight="300" fill="#0f766e" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">
      <div class="swatch" style="background:#0d9488"></div>
      <div class="swatch" style="background:#5eead4"></div>
      <div class="swatch" style="background:#042f2e"></div>
      <span class="swatch-label">#0d9488 · #5eead4</span>
    </div>
  </div>

  <!-- OPTION C: Shattered Prism — Rose Gold -->
  <div class="card">
    <span class="card-label">Option C — Facet</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oC1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#e11d48"/>
              <stop offset="100%" stop-color="#fda4af"/>
            </linearGradient>
            <linearGradient id="oC2" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fda4af"/>
              <stop offset="100%" stop-color="#be123c"/>
            </linearGradient>
          </defs>
          <!-- Geometric faceted crystal -->
          <polygon points="30,6 48,28 40,38" fill="url(#oC1)" opacity="0.9"/>
          <polygon points="30,6 12,28 20,38" fill="url(#oC2)" opacity="0.6"/>
          <polygon points="12,28 20,38 8,52" fill="#be123c" opacity="0.35"/>
          <polygon points="48,28 40,38 52,52" fill="#fda4af" opacity="0.35"/>
          <polygon points="20,38 40,38 36,58 24,58" fill="url(#oC1)" opacity="0.5"/>
          <polygon points="24,58 36,58 30,70" fill="#e11d48" opacity="0.7"/>
          <!-- Highlight edge -->
          <line x1="30" y1="6" x2="48" y2="28" stroke="#fecdd3" stroke-width="0.8" opacity="0.5"/>
          <text x="64" y="34" font-size="26" font-weight="700" fill="#fff1f2" letter-spacing="1">talent</text>
          <text x="64" y="58" font-size="18" font-weight="300" fill="#fb7185" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oCl1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#be123c"/>
              <stop offset="100%" stop-color="#e11d48"/>
            </linearGradient>
            <linearGradient id="oCl2" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e11d48"/>
              <stop offset="100%" stop-color="#9f1239"/>
            </linearGradient>
          </defs>
          <polygon points="30,6 48,28 40,38" fill="url(#oCl1)" opacity="0.85"/>
          <polygon points="30,6 12,28 20,38" fill="url(#oCl2)" opacity="0.55"/>
          <polygon points="12,28 20,38 8,52" fill="#9f1239" opacity="0.3"/>
          <polygon points="48,28 40,38 52,52" fill="#e11d48" opacity="0.3"/>
          <polygon points="20,38 40,38 36,58 24,58" fill="url(#oCl1)" opacity="0.45"/>
          <polygon points="24,58 36,58 30,70" fill="#be123c" opacity="0.65"/>
          <text x="64" y="34" font-size="26" font-weight="700" fill="#1a0a0e" letter-spacing="1">talent</text>
          <text x="64" y="58" font-size="18" font-weight="300" fill="#be123c" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">
      <div class="swatch" style="background:#e11d48"></div>
      <div class="swatch" style="background:#fda4af"></div>
      <div class="swatch" style="background:#4c0519"></div>
      <span class="swatch-label">#e11d48 · #fda4af</span>
    </div>
  </div>

  <!-- OPTION D: Spiral DNA — Indigo & Lavender -->
  <div class="card">
    <span class="card-label">Option D — Helix</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oD" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
          <!-- Abstract double helix / DNA spiral -->
          <path d="M10,10 C22,10 38,28 26,38 C14,48 38,66 50,66" fill="none" stroke="url(#oD)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M10,66 C22,66 38,48 26,38 C14,28 38,10 50,10" fill="none" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
          <!-- Cross rungs -->
          <line x1="16" y1="18" x2="16" y2="58" stroke="#818cf8" stroke-width="0.6" opacity="0.2"/>
          <line x1="26" y1="28" x2="26" y2="48" stroke="#818cf8" stroke-width="0.6" opacity="0.3"/>
          <line x1="36" y1="18" x2="36" y2="58" stroke="#818cf8" stroke-width="0.6" opacity="0.2"/>
          <!-- Nodes -->
          <circle cx="10" cy="10" r="2.5" fill="#818cf8"/>
          <circle cx="50" cy="66" r="2.5" fill="#4f46e5"/>
          <circle cx="50" cy="10" r="2" fill="#c7d2fe" opacity="0.5"/>
          <circle cx="10" cy="66" r="2" fill="#c7d2fe" opacity="0.5"/>
          <text x="64" y="34" font-size="26" font-weight="700" fill="#eef2ff" letter-spacing="1">talent</text>
          <text x="64" y="58" font-size="18" font-weight="300" fill="#818cf8" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oDl" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#4338ca"/>
            </linearGradient>
          </defs>
          <path d="M10,10 C22,10 38,28 26,38 C14,48 38,66 50,66" fill="none" stroke="url(#oDl)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M10,66 C22,66 38,48 26,38 C14,28 38,10 50,10" fill="none" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
          <line x1="16" y1="18" x2="16" y2="58" stroke="#4338ca" stroke-width="0.6" opacity="0.15"/>
          <line x1="26" y1="28" x2="26" y2="48" stroke="#4338ca" stroke-width="0.6" opacity="0.25"/>
          <line x1="36" y1="18" x2="36" y2="58" stroke="#4338ca" stroke-width="0.6" opacity="0.15"/>
          <circle cx="10" cy="10" r="2.5" fill="#6366f1"/>
          <circle cx="50" cy="66" r="2.5" fill="#4338ca"/>
          <circle cx="50" cy="10" r="2" fill="#4338ca" opacity="0.35"/>
          <circle cx="10" cy="66" r="2" fill="#4338ca" opacity="0.35"/>
          <text x="64" y="34" font-size="26" font-weight="700" fill="#0f0f1a" letter-spacing="1">talent</text>
          <text x="64" y="58" font-size="18" font-weight="300" fill="#4338ca" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">
      <div class="swatch" style="background:#4f46e5"></div>
      <div class="swatch" style="background:#818cf8"></div>
      <div class="swatch" style="background:#1e1b4b"></div>
      <span class="swatch-label">#4f46e5 · #818cf8</span>
    </div>
  </div>

  <!-- OPTION E: Fluid Wave — Slate & Ice Blue -->
  <div class="card">
    <span class="card-label">Option E — Flux</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oE" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#475569"/>
              <stop offset="50%" stop-color="#94a3b8"/>
              <stop offset="100%" stop-color="#e2e8f0"/>
            </linearGradient>
          </defs>
          <!-- Flowing abstract wave layers -->
          <path d="M4,48 C12,28 24,52 32,32 C40,12 52,44 58,24" fill="none" stroke="url(#oE)" stroke-width="3" stroke-linecap="round"/>
          <path d="M4,56 C12,36 24,60 32,40 C40,20 52,52 58,32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
          <path d="M4,64 C12,44 24,68 32,48 C40,28 52,60 58,40" fill="none" stroke="#64748b" stroke-width="0.8" stroke-linecap="round" opacity="0.15"/>
          <!-- Accent dots at peaks -->
          <circle cx="4" cy="48" r="2" fill="#e2e8f0"/>
          <circle cx="58" cy="24" r="2.5" fill="#e2e8f0"/>
          <text x="72" y="34" font-size="26" font-weight="700" fill="#f1f5f9" letter-spacing="1">talent</text>
          <text x="72" y="58" font-size="18" font-weight="300" fill="#94a3b8" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oEl" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#334155"/>
              <stop offset="50%" stop-color="#475569"/>
              <stop offset="100%" stop-color="#1e293b"/>
            </linearGradient>
          </defs>
          <path d="M4,48 C12,28 24,52 32,32 C40,12 52,44 58,24" fill="none" stroke="url(#oEl)" stroke-width="3" stroke-linecap="round"/>
          <path d="M4,56 C12,36 24,60 32,40 C40,20 52,52 58,32" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
          <path d="M4,64 C12,44 24,68 32,48 C40,28 52,60 58,40" fill="none" stroke="#64748b" stroke-width="0.8" stroke-linecap="round" opacity="0.12"/>
          <circle cx="4" cy="48" r="2" fill="#334155"/>
          <circle cx="58" cy="24" r="2.5" fill="#1e293b"/>
          <text x="72" y="34" font-size="26" font-weight="700" fill="#0f172a" letter-spacing="1">talent</text>
          <text x="72" y="58" font-size="18" font-weight="300" fill="#475569" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">
      <div class="swatch" style="background:#475569"></div>
      <div class="swatch" style="background:#94a3b8"></div>
      <div class="swatch" style="background:#e2e8f0"></div>
      <span class="swatch-label">#475569 · #94a3b8</span>
    </div>
  </div>

  <!-- OPTION F: Tessellation — Emerald & Gold -->
  <div class="card">
    <span class="card-label">Option F — Mosaic</span>
    <div class="logo-container">
      <div class="logo-dark">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oF1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#059669"/>
              <stop offset="100%" stop-color="#a7f3d0"/>
            </linearGradient>
            <linearGradient id="oF2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fbbf24"/>
              <stop offset="100%" stop-color="#d97706"/>
            </linearGradient>
          </defs>
          <!-- Tessellated geometric fragments -->
          <polygon points="28,8 44,20 28,32" fill="url(#oF1)" opacity="0.85"/>
          <polygon points="28,8 12,20 28,32" fill="#059669" opacity="0.5"/>
          <polygon points="12,20 28,32 12,44" fill="url(#oF1)" opacity="0.35"/>
          <polygon points="44,20 28,32 44,44" fill="#34d399" opacity="0.55"/>
          <polygon points="28,32 44,44 28,56" fill="url(#oF2)" opacity="0.7"/>
          <polygon points="28,32 12,44 28,56" fill="#fbbf24" opacity="0.3"/>
          <polygon points="12,44 28,56 12,68" fill="#d97706" opacity="0.2"/>
          <polygon points="44,44 28,56 44,68" fill="url(#oF2)" opacity="0.4"/>
          <text x="60" y="34" font-size="26" font-weight="700" fill="#f0fdf4" letter-spacing="1">talent</text>
          <text x="60" y="58" font-size="18" font-weight="300" fill="#6ee7b7" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
      <div class="logo-light">
        <svg width="300" height="76" viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oFl1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#047857"/>
              <stop offset="100%" stop-color="#059669"/>
            </linearGradient>
            <linearGradient id="oFl2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#d97706"/>
              <stop offset="100%" stop-color="#b45309"/>
            </linearGradient>
          </defs>
          <polygon points="28,8 44,20 28,32" fill="url(#oFl1)" opacity="0.8"/>
          <polygon points="28,8 12,20 28,32" fill="#047857" opacity="0.45"/>
          <polygon points="12,20 28,32 12,44" fill="url(#oFl1)" opacity="0.3"/>
