<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Scale — People & Recruitment Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080c;
    --card: #111118;
    --border: #1e1e2a;
    --text: #e8e8ef;
    --muted: #6a6a7e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 60px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 64px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .header p {
    font-size: 12px;
    color: #44445a;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 28px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), border-color 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: #2a2a3a;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }

  .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
  }

  .logo-dark {
    background: #06060a;
    border-radius: 14px;
    padding: 40px 48px;
    width: 100%;
    display: flex;
    justify-content: center;
    border: 1px solid #14141e;
  }

  .logo-light {
    background: #f8f8fa;
    border-radius: 14px;
    padding: 40px 48px;
    width: 100%;
    display: flex;
    justify-content: center;
    border: 1px solid #e8e8ec;
  }

  .color-swatches {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
  }

  .swatch-label {
    font-size: 10px;
    color: #44445a;
    margin-left: 8px;
    font-family: 'DM Sans', monospace;
    letter-spacing: 0.5px;
  }

  svg text {
    font-family: 'Outfit', sans-serif;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Talent Scale</h1>
  <p>People & recruitment focused — Vol. 3</p>
</div>

<div class="grid">

  <!-- OPTION 1: Connected People Network — Electric Blue -->

              <stop offset="100%" stop-color="#93c5fd"/>

        </svg>
      </div>

          <path d="M46,56 C46,53 58,53 58,56" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.3"/>
          <text x="72" y="34" font-size="26" font-weight="700" fill="#0c1629" letter-spacing="1">talent</text>
          <text x="72" y="58" font-size="18" font-weight="300" fill="#1d4ed8" letter-spacing="8" opacity="0.8">scale</text>
        </svg>
      </div>
    </div>
    <div class="color-swatches">

            <linearGradient id="c1l" x1="0" y1="0" x2="1" y2="1">
