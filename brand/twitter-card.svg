<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <style>text{ font-family="'Outfit',sans-serif"; }</style>
  <defs>
    <linearGradient id="twGrad" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="twBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#08080e"/>
      <stop offset="100%" stop-color="#0c1812"/>
    </linearGradient>
    <pattern id="twdots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#059669" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#twBg)"/>
  <rect width="1200" height="600" fill="url(#twdots)"/>

  <!-- Large background mountain -->
  <path d="M980,600 L1200,200 L1200,600 Z" fill="#059669" opacity="0.05"/>

  <!-- Left icon mark -->
  <path d="M100,130 L230,360 L-30,360 Z"  fill="url(#twGrad)" opacity="0.22"/>
  <path d="M100,190 L214,368 L-14,368 Z"  fill="url(#twGrad)" opacity="0.55"/>
  <path d="M100,265 L168,382 L32,382 Z"   fill="url(#twGrad)"/>
  <line x1="-20" y1="420" x2="220" y2="420" stroke="#C7632A" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="-20" y1="411" x2="160" y2="411" stroke="#C7632A" stroke-width="1.8" opacity="0.35" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="260" y="330" font-size="120" font-weight="800" fill="#ecfdf5" letter-spacing="-4">TALENT</text>
  <text x="264" y="430" font-size="76"  font-weight="300" fill="#C7632A"      letter-spacing="26">SCALE</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="572" width="1200" height="4" fill="#C7632A" opacity="0.65"/>
  <rect x="0" y="568" width="500"  height="2" fill="#C7632A" opacity="0.22"/>

  <!-- URL hint -->
  <text x="264" y="500" font-size="24" font-weight="300" fill="#34d399" opacity="0.55" letter-spacing="3">talentscale.io</text>
</svg>