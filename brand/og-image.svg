<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <style>text{ font-family="'Outfit',sans-serif"; }</style>
  <defs>
    <linearGradient id="ogGrad" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#0e1a14"/>
    </linearGradient>
    <!-- subtle dot grid -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#059669" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative large mountain (bg, faded) -->
  <path d="M140,540 L420,120 L700,540 Z" fill="#059669" opacity="0.04"/>

  <!-- Accent line strip at bottom -->
  <rect x="0" y="600" width="1200" height="4" fill="#C7632A" opacity="0.7"/>
  <rect x="0" y="596" width="600" height="2" fill="#C7632A" opacity="0.25"/>

  <!-- Icon mark -->
  <path d="M140,160 L280,390 L0,390 Z"   fill="url(#ogGrad)" opacity="0.22"/>
  <path d="M140,220 L258,400 L22,400 Z"  fill="url(#ogGrad)" opacity="0.55"/>
  <path d="M140,295 L210,415 L70,415 Z"  fill="url(#ogGrad)"/>
  <line x1="10"  y1="450" x2="270" y2="450" stroke="#C7632A" stroke-width="5" stroke-linecap="round"/>
  <line x1="10"  y1="440" x2="200" y2="440" stroke="#C7632A" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="300" y="360" font-size="128" font-weight="800" fill="#ecfdf5" letter-spacing="-4">TALENT</text>
  <text x="304" y="460" font-size="80"  font-weight="300" fill="#C7632A"      letter-spacing="28">SCALE</text>

  <!-- Tagline -->
  <text x="304" y="530" font-size="26" font-weight="300" fill="#34d399" opacity="0.7" letter-spacing="3">RECRUITMENT · INTELLIGENCE · GROWTH</text>
</svg>